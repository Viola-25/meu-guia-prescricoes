<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Prescricoes e REMUME SP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .prescription-content {
            font-family: 'Roboto Mono', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        @media (max-width: 767px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 40;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #sidebar-overlay {
                display: none;
                z-index: 30;
            }

            #sidebar-overlay.open {
                display: block;
            }
        }
    </style>
</head>
<body class="bg-gray-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 md:hidden"></div>

        <aside id="sidebar" class="absolute inset-y-0 left-0 md:static w-72 md:w-80 bg-white shadow-lg h-full flex flex-col overflow-y-auto">
            <div class="p-4 border-b">
                <h1 class="text-2xl font-bold text-teal-700">Guia de Prescricoes</h1>
                <button id="close-sidebar-btn" class="md:hidden absolute top-4 right-4 text-gray-500 hover:text-gray-800">
                    <ion-icon name="close-outline" class="text-3xl"></ion-icon>
                </button>
            </div>

            <div class="p-4 border-b">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Buscar doenca..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <ion-icon name="search-outline" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></ion-icon>
                </div>
            </div>

            <nav id="sidebar-nav" class="flex-1 p-4 space-y-4 overflow-y-auto">
                <div id="nav-loading" class="text-center text-gray-500 mt-8">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-teal-500"></div>
                    <p class="mt-2">Carregando...</p>
                </div>
                <div id="nav-empty" class="text-center text-gray-500 mt-8 hidden">Nenhuma prescricao encontrada.</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-md p-4 flex justify-between items-center z-10">
                <button id="menu-btn" class="md:hidden text-gray-700 hover:text-teal-600">
                    <ion-icon name="menu-outline" class="text-3xl"></ion-icon>
                </button>

                <div class="hidden md:block">
                    <p id="breadcrumb" class="text-sm text-gray-500">Selecione uma area e uma doenca no menu ao lado.</p>
                </div>

                <div class="bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-sm font-medium border border-teal-200">
                    Base estatica (somente leitura)
                </div>
            </header>

            <div class="bg-white border-b px-4 md:px-8 py-3">
                <div class="inline-flex rounded-lg border border-gray-200 p-1 bg-gray-50">
                    <button id="tab-prescricoes" class="px-4 py-2 rounded-md text-sm font-semibold bg-teal-600 text-white">
                        Prescricoes
                    </button>
                    <button id="tab-remume" class="px-4 py-2 rounded-md text-sm font-semibold text-gray-700 hover:bg-gray-100">
                        REMUME SP
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 md:p-8">
                <div id="content-placeholder" class="text-center text-gray-500 mt-16">
                    <ion-icon name="document-text-outline" class="text-8xl text-gray-300"></ion-icon>
                    <h2 class="text-2xl font-medium mt-4">Bem-vindo</h2>
                    <p class="mt-2">Selecione uma doenca no menu lateral para ver a prescricao.</p>
                </div>

                <div id="content-display" class="hidden max-w-4xl mx-auto">
                    <h2 id="content-title" class="text-3xl md:text-4xl font-bold text-gray-800 mb-2"></h2>
                    <p id="content-cid" class="text-lg text-gray-500 font-medium mb-6"></p>

                    <div class="relative">
                        <button id="copy-btn" class="absolute top-4 right-4 bg-gray-200 text-gray-700 px-3 py-1 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors flex items-center space-x-1.5">
                            <ion-icon name="copy-outline"></ion-icon>
                            <span>Copiar</span>
                        </button>
                        <pre id="content-text" class="prescription-content bg-white shadow-md rounded-lg p-6 md:p-8 text-sm md:text-base text-gray-900 border border-gray-200"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-white bg-opacity-80 items-center justify-center z-[70]">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-teal-600"></div>
    </div>

    <script>
        let allPrescricoes = [];
        let allRemume = [];
        let currentTab = 'prescricoes';

        const loadingOverlay = document.getElementById('loading-overlay');
        const sidebarNav = document.getElementById('sidebar-nav');
        const navLoading = document.getElementById('nav-loading');
        const navEmpty = document.getElementById('nav-empty');
        const searchInput = document.getElementById('search-input');

        const contentPlaceholder = document.getElementById('content-placeholder');
        const contentDisplay = document.getElementById('content-display');
        const contentTitle = document.getElementById('content-title');
        const contentCid = document.getElementById('content-cid');
        const contentText = document.getElementById('content-text');
        const copyBtn = document.getElementById('copy-btn');
        const breadcrumb = document.getElementById('breadcrumb');

        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const tabPrescricoes = document.getElementById('tab-prescricoes');
        const tabRemume = document.getElementById('tab-remume');

        const showLoading = (show) => {
            loadingOverlay.classList.toggle('hidden', !show);
            loadingOverlay.classList.toggle('flex', show);
        };

        const normalizeForSearch = (text) => (text || '').toLowerCase();

        const renderSidebar = (items, options) => {
            if (items.length === 0) {
                navLoading.classList.add('hidden');
                navEmpty.textContent = options.emptyMessage;
                navEmpty.classList.remove('hidden');
                sidebarNav.innerHTML = '';
                return;
            }

            navLoading.classList.add('hidden');
            navEmpty.classList.add('hidden');

            const grouped = items.reduce((acc, curr) => {
                const groupKey = curr[options.groupField] || options.defaultGroup;
                if (!acc[groupKey]) {
                    acc[groupKey] = [];
                }
                acc[groupKey].push(curr);
                return acc;
            }, {});

            for (const groupKey in grouped) {
                grouped[groupKey].sort((a, b) => {
                    const aText = a[options.titleField] || '';
                    const bText = b[options.titleField] || '';
                    return aText.localeCompare(bText);
                });
            }

            const sortedAreas = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
            let html = '';

            sortedAreas.forEach((area) => {
                html += `
                    <div class="space-y-1" data-area-group="${normalizeForSearch(area)}">
                        <h3 class="text-xl font-bold text-teal-700 px-2 py-1">${area}</h3>
                        <ul class="space-y-0.5 ml-2 border-l-2 border-gray-200">
                `;

                grouped[area].forEach((item) => {
                    const title = item[options.titleField] || 'Sem nome';
                    const searchTerms = [
                        item[options.titleField],
                        item[options.groupField],
                        item.cid,
                        item.categoria,
                        item.apresentacao
                    ].join(' ');
                    html += `
                        <li class="flex">
                            <button data-id="${item.id}" data-type="${options.type}" class="nav-item-btn w-full text-left text-gray-700 hover:text-teal-600 hover:bg-teal-50 rounded-r-lg px-4 py-2 transition-colors duration-150"
                                data-search-term="${normalizeForSearch(searchTerms)}">
                                ${title}
                            </button>
                        </li>
                    `;
                });

                html += '</ul></div>';
            });

            sidebarNav.innerHTML = html;
        };

        const displayPrescription = (id) => {
            const item = allPrescricoes.find((p) => p.id === id);
            if (!item) {
                return;
            }

            contentTitle.textContent = item.doenca;
            contentCid.textContent = item.cid ? `CID: ${item.cid}` : '';
            contentText.textContent = item.texto;

            contentPlaceholder.classList.add('hidden');
            contentDisplay.classList.remove('hidden');
            breadcrumb.textContent = `${item.area} > ${item.doenca}`;

            document.querySelectorAll('.nav-item-btn').forEach((btn) => {
                btn.classList.remove('bg-teal-100', 'text-teal-700', 'font-semibold');
                if (btn.dataset.id === id) {
                    btn.classList.add('bg-teal-100', 'text-teal-700', 'font-semibold');
                }
            });

            if (window.innerWidth < 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        };

        const displayRemume = (id) => {
            const item = allRemume.find((p) => p.id === id);
            if (!item) {
                return;
            }

            contentTitle.textContent = item.nome;
            contentCid.textContent = item.categoria ? `Categoria: ${item.categoria}` : 'Medicamento REMUME SP';
            contentText.textContent = [
                `Apresentacao: ${item.apresentacao || 'Nao informada'}`,
                '',
                `Grupo: ${item.grupo || 'Nao informado'}`,
                '',
                `Observacao: ${item.observacao || 'Sem observacoes.'}`
            ].join('\n');

            contentPlaceholder.classList.add('hidden');
            contentDisplay.classList.remove('hidden');
            breadcrumb.textContent = `REMUME SP > ${item.nome}`;

            document.querySelectorAll('.nav-item-btn').forEach((btn) => {
                btn.classList.remove('bg-teal-100', 'text-teal-700', 'font-semibold');
                if (btn.dataset.id === id) {
                    btn.classList.add('bg-teal-100', 'text-teal-700', 'font-semibold');
                }
            });

            if (window.innerWidth < 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        };

        const filterSidebar = (term) => {
            const lowerTerm = normalizeForSearch(term);
            const items = document.querySelectorAll('.nav-item-btn');
            const areaGroups = document.querySelectorAll('[data-area-group]');
            let itemsFound = 0;

            items.forEach((item) => {
                const searchTerm = item.dataset.searchTerm;
                if (searchTerm.includes(lowerTerm)) {
                    item.parentElement.classList.remove('hidden');
                    itemsFound++;
                } else {
                    item.parentElement.classList.add('hidden');
                }
            });

            areaGroups.forEach((group) => {
                const visibleItems = group.querySelectorAll('li:not(.hidden)');
                group.classList.toggle('hidden', visibleItems.length === 0);
            });

            const activeCount = currentTab === 'prescricoes' ? allPrescricoes.length : allRemume.length;
            if (itemsFound === 0 && activeCount > 0) {
                navEmpty.textContent = 'Nenhum resultado encontrado.';
                navEmpty.classList.remove('hidden');
            } else if (activeCount > 0) {
                navEmpty.classList.add('hidden');
            }
        };

        const setTabStyles = () => {
            tabPrescricoes.classList.toggle('bg-teal-600', currentTab === 'prescricoes');
            tabPrescricoes.classList.toggle('text-white', currentTab === 'prescricoes');
            tabPrescricoes.classList.toggle('text-gray-700', currentTab !== 'prescricoes');

            tabRemume.classList.toggle('bg-teal-600', currentTab === 'remume');
            tabRemume.classList.toggle('text-white', currentTab === 'remume');
            tabRemume.classList.toggle('text-gray-700', currentTab !== 'remume');
        };

        const renderActiveTab = () => {
            contentDisplay.classList.add('hidden');
            contentPlaceholder.classList.remove('hidden');

            if (currentTab === 'prescricoes') {
                breadcrumb.textContent = 'Selecione uma area e uma doenca no menu ao lado.';
                searchInput.placeholder = 'Buscar doenca...';
                renderSidebar(allPrescricoes, {
                    type: 'prescricao',
                    groupField: 'area',
                    titleField: 'doenca',
                    defaultGroup: 'Sem Area',
                    emptyMessage: 'Nenhuma prescricao encontrada.'
                });
            } else {
                breadcrumb.textContent = 'Selecione um medicamento REMUME SP no menu ao lado.';
                searchInput.placeholder = 'Buscar medicamento REMUME...';
                renderSidebar(allRemume, {
                    type: 'remume',
                    groupField: 'grupo',
                    titleField: 'nome',
                    defaultGroup: 'Sem Grupo',
                    emptyMessage: 'Nenhum medicamento REMUME encontrado.'
                });
            }

            filterSidebar(searchInput.value);
            setTabStyles();
        };

        const loadStaticData = async () => {
            showLoading(true);
            try {
                const [prescricoesResponse, remumeResponse] = await Promise.all([
                    fetch('data/prescricoes.json', { cache: 'no-store' }),
                    fetch('data/remume-sp.json', { cache: 'no-store' })
                ]);

                if (!prescricoesResponse.ok) {
                    throw new Error(`Falha ao carregar prescricoes (${prescricoesResponse.status}).`);
                }

                const prescricoesData = await prescricoesResponse.json();
                allPrescricoes = prescricoesData.map((item, index) => ({
                    id: item.id || String(index + 1),
                    area: item.area || 'Sem Area',
                    doenca: item.doenca || 'Sem nome',
                    cid: item.cid || '',
                    texto: item.texto || ''
                }));

                if (remumeResponse.ok) {
                    const remumeData = await remumeResponse.json();
                    allRemume = remumeData.map((item, index) => ({
                        id: item.id || `remume-${index + 1}`,
                        nome: item.nome || 'Sem nome',
                        grupo: item.grupo || 'Sem Grupo',
                        categoria: item.categoria || '',
                        apresentacao: item.apresentacao || '',
                        observacao: item.observacao || ''
                    }));
                } else {
                    allRemume = [];
                }

                renderActiveTab();
            } catch (error) {
                console.error(error);
                navLoading.classList.add('hidden');
                navEmpty.textContent = 'Erro ao carregar dados locais. Use um servidor HTTP local.';
                navEmpty.classList.remove('hidden');
            } finally {
                showLoading(false);
            }
        };

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('open');
        });

        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });

        searchInput.addEventListener('keyup', (e) => {
            filterSidebar(e.target.value);
        });

        sidebarNav.addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-item-btn');
            if (btn) {
                if (btn.dataset.type === 'remume') {
                    displayRemume(btn.dataset.id);
                } else {
                    displayPrescription(btn.dataset.id);
                }
            }
        });

        tabPrescricoes.addEventListener('click', () => {
            currentTab = 'prescricoes';
            renderActiveTab();
        });

        tabRemume.addEventListener('click', () => {
            currentTab = 'remume';
            renderActiveTab();
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(contentText.textContent);
                copyBtn.querySelector('span').textContent = 'Copiado!';
                copyBtn.querySelector('ion-icon').setAttribute('name', 'checkmark-outline');
                setTimeout(() => {
                    copyBtn.querySelector('span').textContent = 'Copiar';
                    copyBtn.querySelector('ion-icon').setAttribute('name', 'copy-outline');
                }, 1500);
            } catch (error) {
                alert('Nao foi possivel copiar o texto.');
            }
        });

        loadStaticData();
    </script>
</body>
</html>
