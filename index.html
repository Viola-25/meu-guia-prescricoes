<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Prescricoes e REMUME SP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --bg-1: #f7f6ef;
            --bg-2: #e7f2e8;
            --ink: #1a1f1d;
            --brand: #0f766e;
            --brand-soft: #d7f0ed;
            --surface: rgba(255, 255, 255, 0.84);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(1200px 600px at -10% -10%, #fff7cc 0%, transparent 55%),
                radial-gradient(1000px 600px at 110% 0%, #d9efe2 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .prescription-content {
            font-family: 'IBM Plex Mono', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .glass {
            backdrop-filter: blur(8px);
            background: var(--surface);
        }

        .surface-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }

        .brand-shadow {
            box-shadow: 0 8px 24px rgba(15, 118, 110, 0.18);
        }

        .chip {
            border-radius: 999px;
        }

        .nav-item-btn {
            border-left: 3px solid transparent;
            line-height: 1.25rem;
        }

        .nav-item-btn:hover {
            border-left-color: rgba(15, 118, 110, 0.45);
        }

        .nav-item-btn.bg-teal-100 {
            border-left-color: rgba(15, 118, 110, 1);
        }

        #content-text {
            line-height: 1.55;
        }

        #content-title {
            text-wrap: balance;
        }

        #content-cid {
            text-wrap: pretty;
        }

        ::selection {
            background: rgba(15, 118, 110, 0.2);
        }

        .fade-up {
            animation: fadeUp 260ms ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        @media (max-width: 767px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 40;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #sidebar-overlay {
                display: none;
                z-index: 30;
            }

            #sidebar-overlay.open {
                display: block;
            }

            #content-actions {
                position: static;
                margin-bottom: 0.75rem;
                justify-content: flex-end;
            }

            #content-text {
                padding-top: 1.25rem;
            }

            #content-placeholder {
                margin-top: 3rem;
            }
        }
    </style>
</head>
<body class="antialiased">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 md:hidden"></div>

        <aside id="sidebar" class="absolute inset-y-0 left-0 md:static w-72 md:w-80 glass shadow-lg h-full flex flex-col overflow-y-auto border-r border-white/60">
            <div class="p-4 border-b border-gray-200/80">
                <h1 class="text-2xl font-bold text-teal-700">Guia de Prescricoes</h1>
                <button id="close-sidebar-btn" class="md:hidden absolute top-4 right-4 text-gray-500 hover:text-gray-800">
                    <ion-icon name="close-outline" class="text-3xl"></ion-icon>
                </button>
            </div>

            <div class="p-4 border-b border-gray-200/80 space-y-2">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Buscar doenca..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <ion-icon name="search-outline" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></ion-icon>
                    <button id="clear-search-btn" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 px-2 py-1 rounded" aria-label="Limpar busca">
                        <ion-icon name="close-circle-outline" class="text-xl"></ion-icon>
                    </button>
                </div>
                <p class="text-xs text-gray-500">Dica: use / ou Ctrl+K para focar a busca.</p>
            </div>

            <nav id="sidebar-nav" class="flex-1 p-4 space-y-4 overflow-y-auto">
                <div id="nav-loading" class="text-center text-gray-500 mt-8">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-teal-500"></div>
                    <p class="mt-2">Carregando...</p>
                </div>
                <div id="nav-empty" class="text-center text-gray-500 mt-8 hidden">Nenhuma prescricao encontrada.</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="glass shadow-sm p-3 md:p-4 flex justify-between items-center z-10 border-b border-white/60 sticky top-0">
                <button id="menu-btn" class="md:hidden text-gray-700 hover:text-teal-600">
                    <ion-icon name="menu-outline" class="text-3xl"></ion-icon>
                </button>

                <div class="hidden md:block">
                    <p id="breadcrumb" class="text-sm text-gray-500">Selecione uma area e uma doenca no menu ao lado.</p>
                </div>

                <div class="flex items-center gap-1.5 md:gap-2 text-[11px] md:text-sm flex-wrap justify-end">
                    <span id="count-prescricoes" class="chip bg-teal-50 text-teal-700 px-2.5 md:px-3 py-1.5 md:py-2 font-medium border border-teal-200">Prescricoes: 0</span>
                    <span id="count-remume" class="chip bg-emerald-50 text-emerald-700 px-2.5 md:px-3 py-1.5 md:py-2 font-medium border border-emerald-200">REMUME: 0</span>
                    <span class="chip bg-gray-100 text-gray-600 px-2.5 md:px-3 py-1.5 md:py-2 font-medium border border-gray-200">Somente leitura</span>
                </div>
            </header>

            <div class="glass border-b border-white/60 px-4 md:px-8 py-3 sticky top-[58px] md:top-[68px] z-10">
                <div class="inline-flex rounded-xl border border-gray-200 p-1 bg-gray-50/90">
                    <button id="tab-prescricoes" class="px-4 py-2 rounded-lg text-sm font-semibold bg-teal-600 text-white brand-shadow">
                        Prescricoes
                    </button>
                    <button id="tab-remume" class="px-4 py-2 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-100">
                        REMUME SP
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8">
                <div id="content-placeholder" class="text-center text-gray-500 mt-16">
                    <ion-icon name="document-text-outline" class="text-7xl md:text-8xl text-gray-300"></ion-icon>
                    <h2 class="text-2xl md:text-3xl font-semibold mt-4">Bem-vindo</h2>
                    <p class="mt-2 text-sm md:text-base">Selecione uma doenca no menu lateral para ver a prescricao.</p>
                </div>

                <div id="content-display" class="hidden max-w-4xl mx-auto fade-up">
                    <h2 id="content-title" class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-800 mb-2"></h2>
                    <p id="content-cid" class="text-base md:text-lg text-gray-500 font-medium mb-4 md:mb-6"></p>

                    <div class="relative">
                        <div id="content-actions" class="absolute top-4 right-4 flex gap-2 flex-wrap justify-end">
                            <button id="export-btn" class="chip bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-emerald-200 transition-colors flex items-center space-x-1.5 border border-emerald-200">
                                <ion-icon name="download-outline"></ion-icon>
                                <span>TXT</span>
                            </button>
                            <button id="copy-btn" class="chip bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors flex items-center space-x-1.5 border border-gray-300">
                                <ion-icon name="copy-outline"></ion-icon>
                                <span>Copiar</span>
                            </button>
                        </div>
                        <pre id="content-text" class="prescription-content surface-card rounded-2xl p-5 sm:p-6 md:p-8 pt-14 sm:pt-16 md:pt-8 text-[13px] sm:text-sm md:text-base text-gray-900"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-white bg-opacity-80 items-center justify-center z-[70]">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-teal-600"></div>
    </div>

    <script>
        let allPrescricoes = [];
        let allRemume = [];
        let currentTab = 'prescricoes';

        const loadingOverlay = document.getElementById('loading-overlay');
        const sidebarNav = document.getElementById('sidebar-nav');
        const navLoading = document.getElementById('nav-loading');
        const navEmpty = document.getElementById('nav-empty');
        const searchInput = document.getElementById('search-input');

        const contentPlaceholder = document.getElementById('content-placeholder');
        const contentDisplay = document.getElementById('content-display');
        const contentTitle = document.getElementById('content-title');
        const contentCid = document.getElementById('content-cid');
        const contentText = document.getElementById('content-text');
        const copyBtn = document.getElementById('copy-btn');
        const breadcrumb = document.getElementById('breadcrumb');

        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const tabPrescricoes = document.getElementById('tab-prescricoes');
        const tabRemume = document.getElementById('tab-remume');
        const clearSearchBtn = document.getElementById('clear-search-btn');
        const exportBtn = document.getElementById('export-btn');
        const countPrescricoes = document.getElementById('count-prescricoes');
        const countRemume = document.getElementById('count-remume');

        const showLoading = (show) => {
            loadingOverlay.classList.toggle('hidden', !show);
            loadingOverlay.classList.toggle('flex', show);
        };

        const normalizeForSearch = (text) => (text || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase();

        const normalizeRecordKeys = (record) => {
            const normalized = {};
            Object.keys(record || {}).forEach((key) => {
                normalized[String(key).toLowerCase()] = record[key];
            });
            return normalized;
        };

        const sanitizeTextValue = (value) => String(value || '').trim();

        const buildPrescriptionText = (rec) => {
            const receituario = Array.isArray(rec.receituario)
                ? rec.receituario.map(sanitizeTextValue).filter(Boolean)
                : [];
            const orientacoes = Array.isArray(rec.orientacoes)
                ? rec.orientacoes.map(sanitizeTextValue).filter(Boolean)
                : [];
            const textoDireto = sanitizeTextValue(rec.texto);

            if (textoDireto) {
                return textoDireto;
            }

            const sections = [];

            if (receituario.length) {
                sections.push(
                    `RECEITUARIO:\n${receituario.map((item, index) => `${index + 1}. ${item}`).join('\n')}`
                );
            }

            if (orientacoes.length) {
                sections.push(
                    `ORIENTACOES:\n${orientacoes.map((item) => `- ${item}`).join('\n')}`
                );
            }

            return sections.join('\n\n') || 'Conteudo nao informado.';
        };

        const cleanRemumeName = (nome) => {
            const cleaned = sanitizeTextValue(nome);
            const knownPrefixes = [
                'NESTAS UNIDADES ',
                'HOSPITAL DIA ',
                'HOSPITAL DIA / AMAE/ AE E EM UNIDADES DE REFERÊNCIA EM OFTALMOLOGIA ',
                'SAE/IST/AIDS, CENTRO DE ESPECIALIDADES ODONTOLÓGICAS, CASA SER, HOSPITAL DIA/ AMAE/ AE ',
                'REFERÊNCIA - EXCLUSIVO PARA TRATAMENTO DE ESQUEMAS ESPECIAIS DE TB/MNT '
            ];

            for (const prefix of knownPrefixes) {
                if (cleaned.startsWith(prefix)) {
                    return cleaned.slice(prefix.length).trim() || cleaned;
                }
            }

            return cleaned;
        };

        const updateCounters = () => {
            countPrescricoes.textContent = `Prescricoes: ${allPrescricoes.length}`;
            countRemume.textContent = `REMUME: ${allRemume.length}`;
        };

        const renderSidebar = (items, options) => {
            if (items.length === 0) {
                navLoading.classList.add('hidden');
                navEmpty.textContent = options.emptyMessage;
                navEmpty.classList.remove('hidden');
                sidebarNav.innerHTML = '';
                return;
            }

            navLoading.classList.add('hidden');
            navEmpty.classList.add('hidden');

            const grouped = items.reduce((acc, curr) => {
                const groupKey = curr[options.groupField] || options.defaultGroup;
                if (!acc[groupKey]) {
                    acc[groupKey] = [];
                }
                acc[groupKey].push(curr);
                return acc;
            }, {});

            for (const groupKey in grouped) {
                grouped[groupKey].sort((a, b) => {
                    const aText = a[options.titleField] || '';
                    const bText = b[options.titleField] || '';
                    return aText.localeCompare(bText);
                });
            }

            const sortedAreas = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
            const fragment = document.createDocumentFragment();

            sortedAreas.forEach((area) => {
                const groupContainer = document.createElement('div');
                groupContainer.className = 'space-y-1';
                groupContainer.dataset.areaGroup = normalizeForSearch(area);

                const groupTitle = document.createElement('h3');
                groupTitle.className = 'text-xl font-bold text-teal-700 px-2 py-1';
                groupTitle.textContent = area;

                const list = document.createElement('ul');
                list.className = 'space-y-0.5 ml-2 border-l-2 border-gray-200';

                grouped[area].forEach((item) => {
                    const title = item[options.titleField] || 'Sem nome';
                    const searchTerms = [
                        item[options.titleField],
                        item[options.groupField],
                        item.cid,
                        item.categoria,
                        item.apresentacao
                    ].join(' ');

                    const li = document.createElement('li');
                    li.className = 'flex';

                    const btn = document.createElement('button');
                    btn.dataset.id = item.id;
                    btn.dataset.type = options.type;
                    btn.dataset.searchTerm = normalizeForSearch(searchTerms);
                    btn.className = 'nav-item-btn w-full text-left text-gray-700 hover:text-teal-600 hover:bg-teal-50 rounded-r-lg px-4 py-2 transition-colors duration-150';
                    btn.textContent = title;

                    li.appendChild(btn);
                    list.appendChild(li);
                });

                groupContainer.appendChild(groupTitle);
                groupContainer.appendChild(list);
                fragment.appendChild(groupContainer);
            });

            sidebarNav.replaceChildren(fragment);
        };

        const displayPrescription = (id) => {
            const item = allPrescricoes.find((p) => p.id === id);
            if (!item) {
                return;
            }

            contentTitle.textContent = item.doenca;
            contentCid.textContent = item.cid ? `CID: ${item.cid}` : '';
            contentText.textContent = item.texto;

            contentPlaceholder.classList.add('hidden');
            contentDisplay.classList.remove('hidden');
            breadcrumb.textContent = `${item.area} > ${item.doenca}`;

            document.querySelectorAll('.nav-item-btn').forEach((btn) => {
                btn.classList.remove('bg-teal-100', 'text-teal-700', 'font-semibold');
                if (btn.dataset.id === id) {
                    btn.classList.add('bg-teal-100', 'text-teal-700', 'font-semibold');
                }
            });

            if (window.innerWidth < 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        };

        const displayRemume = (id) => {
            const item = allRemume.find((p) => p.id === id);
            if (!item) {
                return;
            }

            contentTitle.textContent = item.nome;
            contentCid.textContent = item.categoria ? `Categoria: ${item.categoria}` : 'Medicamento REMUME SP';
            contentText.textContent = [
                `Apresentacao: ${item.apresentacao || 'Nao informada'}`,
                '',
                `Grupo: ${item.grupo || 'Nao informado'}`,
                '',
                `Observacao: ${item.observacao || 'Sem observacoes.'}`
            ].join('\n');

            contentPlaceholder.classList.add('hidden');
            contentDisplay.classList.remove('hidden');
            breadcrumb.textContent = `REMUME SP > ${item.nome}`;

            document.querySelectorAll('.nav-item-btn').forEach((btn) => {
                btn.classList.remove('bg-teal-100', 'text-teal-700', 'font-semibold');
                if (btn.dataset.id === id) {
                    btn.classList.add('bg-teal-100', 'text-teal-700', 'font-semibold');
                }
            });

            if (window.innerWidth < 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        };

        const filterSidebar = (term) => {
            const lowerTerm = normalizeForSearch(term);
            const items = document.querySelectorAll('.nav-item-btn');
            const areaGroups = document.querySelectorAll('[data-area-group]');
            let itemsFound = 0;

            items.forEach((item) => {
                const searchTerm = item.dataset.searchTerm || '';
                if (searchTerm.includes(lowerTerm)) {
                    item.parentElement.classList.remove('hidden');
                    itemsFound++;
                } else {
                    item.parentElement.classList.add('hidden');
                }
            });

            areaGroups.forEach((group) => {
                const visibleItems = group.querySelectorAll('li:not(.hidden)');
                group.classList.toggle('hidden', visibleItems.length === 0);
            });

            const activeCount = currentTab === 'prescricoes' ? allPrescricoes.length : allRemume.length;
            if (itemsFound === 0 && activeCount > 0) {
                navEmpty.textContent = 'Nenhum resultado encontrado.';
                navEmpty.classList.remove('hidden');
            } else if (activeCount > 0) {
                navEmpty.classList.add('hidden');
            }
        };

        const setTabStyles = () => {
            tabPrescricoes.classList.toggle('bg-teal-600', currentTab === 'prescricoes');
            tabPrescricoes.classList.toggle('text-white', currentTab === 'prescricoes');
            tabPrescricoes.classList.toggle('text-gray-700', currentTab !== 'prescricoes');

            tabRemume.classList.toggle('bg-teal-600', currentTab === 'remume');
            tabRemume.classList.toggle('text-white', currentTab === 'remume');
            tabRemume.classList.toggle('text-gray-700', currentTab !== 'remume');
        };

        const renderActiveTab = () => {
            contentDisplay.classList.add('hidden');
            contentPlaceholder.classList.remove('hidden');
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');

            if (currentTab === 'prescricoes') {
                breadcrumb.textContent = 'Selecione uma area e uma doenca no menu ao lado.';
                searchInput.placeholder = 'Buscar doenca...';
                renderSidebar(allPrescricoes, {
                    type: 'prescricao',
                    groupField: 'area',
                    titleField: 'doenca',
                    defaultGroup: 'Sem Area',
                    emptyMessage: 'Nenhuma prescricao encontrada.'
                });
            } else {
                breadcrumb.textContent = 'Selecione um medicamento REMUME SP no menu ao lado.';
                searchInput.placeholder = 'Buscar medicamento REMUME...';
                renderSidebar(allRemume, {
                    type: 'remume',
                    groupField: 'grupo',
                    titleField: 'nome',
                    defaultGroup: 'Sem Grupo',
                    emptyMessage: 'Nenhum medicamento REMUME encontrado.'
                });
            }

            filterSidebar(searchInput.value);
            setTabStyles();
            try {
                localStorage.setItem('guia-tab', currentTab);
            } catch (e) {
                // no-op: localStorage may be blocked in some contexts
            }
        };

        const loadStaticData = async () => {
            showLoading(true);
            try {
                const [prescricoesResponse, remumeResponse] = await Promise.all([
                    fetch('data/prescricoes.json', { cache: 'no-store' }),
                    fetch('data/remume-sp.json', { cache: 'no-store' })
                ]);

                if (!prescricoesResponse.ok) {
                    throw new Error(`Falha ao carregar prescricoes (${prescricoesResponse.status}).`);
                }

                const prescricoesData = await prescricoesResponse.json();
                allPrescricoes = prescricoesData.map((item, index) => ({
                    ...(() => {
                        const rec = normalizeRecordKeys(item);
                        return {
                            id: String(rec.id || index + 1),
                            area: sanitizeTextValue(rec.area) || 'Sem Area',
                            doenca: sanitizeTextValue(rec.doenca) || 'Sem nome',
                            cid: sanitizeTextValue(rec.cid),
                            texto: buildPrescriptionText(rec)
                        };
                    })()
                }));

                if (remumeResponse.ok) {
                    const remumeData = await remumeResponse.json();
                    allRemume = remumeData.map((item, index) => ({
                        ...(() => {
                            const rec = normalizeRecordKeys(item);
                            return {
                                id: String(rec.id || `remume-${index + 1}`),
                                nome: cleanRemumeName(rec.nome) || 'Sem nome',
                                grupo: sanitizeTextValue(rec.grupo) || 'Sem Grupo',
                                categoria: sanitizeTextValue(rec.categoria),
                                apresentacao: sanitizeTextValue(rec.apresentacao),
                                observacao: sanitizeTextValue(rec.observacao)
                            };
                        })()
                    }));
                } else {
                    allRemume = [];
                }

                updateCounters();
                try {
                    const savedTab = localStorage.getItem('guia-tab');
                    if (savedTab === 'remume' || savedTab === 'prescricoes') {
                        currentTab = savedTab;
                    }
                } catch (e) {
                    // no-op
                }

                renderActiveTab();
            } catch (error) {
                console.error(error);
                navLoading.classList.add('hidden');
                navEmpty.textContent = 'Erro ao carregar dados locais. Use um servidor HTTP local.';
                navEmpty.classList.remove('hidden');
            } finally {
                showLoading(false);
            }
        };

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('open');
        });

        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });

        searchInput.addEventListener('input', (e) => {
            filterSidebar(e.target.value);
            clearSearchBtn.classList.toggle('hidden', !e.target.value);
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            filterSidebar('');
            clearSearchBtn.classList.add('hidden');
            searchInput.focus();
        });

        sidebarNav.addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-item-btn');
            if (btn) {
                if (btn.dataset.type === 'remume') {
                    displayRemume(btn.dataset.id);
                } else {
                    displayPrescription(btn.dataset.id);
                }
            }
        });

        tabPrescricoes.addEventListener('click', () => {
            currentTab = 'prescricoes';
            renderActiveTab();
        });

        tabRemume.addEventListener('click', () => {
            currentTab = 'remume';
            renderActiveTab();
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(contentText.textContent);
                copyBtn.querySelector('span').textContent = 'Copiado!';
                copyBtn.querySelector('ion-icon').setAttribute('name', 'checkmark-outline');
                setTimeout(() => {
                    copyBtn.querySelector('span').textContent = 'Copiar';
                    copyBtn.querySelector('ion-icon').setAttribute('name', 'copy-outline');
                }, 1500);
            } catch (error) {
                alert('Nao foi possivel copiar o texto.');
            }
        });

        exportBtn.addEventListener('click', () => {
            if (!contentText.textContent.trim()) {
                return;
            }

            const safeTitle = (contentTitle.textContent || 'guia')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-zA-Z0-9\-\s]/g, '')
                .trim()
                .replace(/\s+/g, '-')
                .toLowerCase();

            const exportDate = new Date().toLocaleString('pt-BR');
            const exportContent = [
                contentTitle.textContent || 'Guia de Prescricoes',
                contentCid.textContent || '',
                `Exportado em: ${exportDate}`,
                '',
                contentText.textContent
            ].join('\n');

            const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${safeTitle || 'guia'}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });

        document.addEventListener('keydown', (event) => {
            const isMac = navigator.platform.toUpperCase().includes('MAC');
            const commandK = isMac ? event.metaKey && event.key.toLowerCase() === 'k' : event.ctrlKey && event.key.toLowerCase() === 'k';

            if (event.key === '/' || commandK) {
                event.preventDefault();
                searchInput.focus();
                searchInput.select();
            }

            if (event.key === 'Escape' && window.innerWidth < 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        });

        loadStaticData();
    </script>
</body>
</html>
